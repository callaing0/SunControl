<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen overflow-hidden">

<div class="h-full flex">

    <!-- 왼쪽 영역 -->
    <div class="w-[60%] relative bg-cover bg-center"
         style="background-image: url('https://energium.kier.re.kr/attach/board/enerland/20231024/494c7838480c39f464e99bba88c9e2a8.jpg');">

        <div class="absolute inset-0 bg-black/40"></div>

        <div class="relative z-10 text-white h-full flex flex-col justify-center px-28">

            <!-- 로고 -->
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-yellow-400 w-10 h-10 rounded flex items-center justify-center text-black font-bold">
                    ☀
                </div>
                <div>
                    <h2 class="text-2xl font-bold">SolarGuard</h2>
                    <p class="text-sm opacity-80">태양광 발전소 관제 시스템</p>
                </div>
            </div>

            <!-- 메인 문구 -->
            <h1 class="text-5xl font-bold leading-tight mb-6">
                태양광 발전소를 <br>
                <span class="text-yellow-400">한눈에 관제하다</span>
            </h1>

            <p class="text-lg opacity-90 mb-10">
                실시간 발전 현황부터 장애 감지, 수익 예측, 환경 기여도까지<br>
                스마트한 태양광 관제를 경험하세요
            </p>

            <!-- 하단 정보 -->
            <div class="flex gap-16 text-center">
                <div>
                    <p class="text-3xl font-bold">0</p>
                    <p class="text-sm opacity-70">등록된 발전소 수</p>
                </div>
                <div>
                    <p class="text-3xl font-bold">60분</p>
                    <p class="text-sm opacity-70">데이터 갱신 주기</p>
                </div>
                <div>
                    <p class="text-3xl font-bold">0</p>
                    <p class="text-sm opacity-70">총(누적) 발전량</p>
                </div>
            </div>

        </div>
    </div>

    <!-- 오른쪽 비밀번호 변경 영역 -->
    <div class="w-[40%] bg-slate-900 flex items-center justify-center">

        <div class="bg-gray-100 w-96 p-8 rounded-3xl shadow-xl">
            <h2 class="text-2xl font-bold mb-2">비밀번호 변경</h2>
            <p class="text-sm text-gray-500 mb-6">
                기존 비밀번호 확인 후 새 비밀번호를 설정하세요
            </p>

            <form method="post" th:action="@{/auth/change-password}" class="space-y-4">

                <!-- 기존 비밀번호 -->
                <div>
                    <label class="block text-sm text-gray-700 mb-2">기존 비밀번호</label>
                    <input type="password" name="currentPassword" autocomplete="current-password" required
                           class="w-full border border-gray-300 rounded-lg h-12 px-4 outline-none focus:border-yellow-500">
                </div>

                <!-- 새로운 비밀번호 -->
                <div>
                    <label class="block text-sm text-gray-700 mb-2">새로운 비밀번호</label>
                    <input type="password" name="newPassword" autocomplete="new-password" required
                           class="w-full border border-gray-300 rounded-lg h-12 px-4 outline-none focus:border-yellow-500">
                </div>

                <!-- 비밀번호 확인 -->
                <div>
                    <label class="block text-sm text-gray-700 mb-2">비밀번호 확인</label>
                    <input type="password" name="confirmPassword" autocomplete="new-password" required
                           class="w-full border border-gray-300 rounded-lg h-12 px-4 outline-none focus:border-yellow-500">
                </div>

                <!-- 버튼 -->
                <button type="submit"
                        class="w-full bg-yellow-500 hover:bg-yellow-600 text-white h-12 rounded-lg font-semibold">
                    변경
                </button>

                <p th:if="${errorMessage}" th:text="${errorMessage}"
                   class="text-red-500 text-sm text-center">
                </p>

            </form>

            <p class="text-xs text-gray-500 text-center mt-6">
                계정 발급은 관리자에게 문의해주세요<br>
                043-123-4567 · SolarGuard@email.com
            </p>
        </div>

    </div>

</div>

</body>
</html>
