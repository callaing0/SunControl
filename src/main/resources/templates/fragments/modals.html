<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="modalStyle">
    <style>
        .modal-bg {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed !important;
            pointer-events: none;
            filter: grayscale(1);
        }
    </style>
</th:block>

<!-- 발전소 등록 -->
<div th:fragment="plantModal" id="plantModal" class="fixed inset-0 z-[100] hidden items-center justify-center modal-bg">
    <div class="bg-white rounded-[45px] shadow-2xl w-[550px] p-12 relative modal-content animate-in fade-in zoom-in duration-300">
        <button type="button" onclick="closeModal('plantModal')" class="absolute top-10 right-10 text-gray-300 hover:text-gray-600 transition-all active:scale-90 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <header class="mb-10 text-center border-b border-gray-50 pb-8">
            <h3 class="text-3xl font-[900] text-gray-800 tracking-tighter italic uppercase">발전소 등록</h3>
            <p class="text-[11px] text-gray-400 mt-2 font-black uppercase tracking-widest italic">New Solar Plant Registration</p>
        </header>

        <form class="space-y-6" id="plantForm" method="post">
            <!-- provinceCode는 districtCode의 앞 두자리이므로 불필요정보 삭제 -->
            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">
            <input type="hidden" name="isMain" value="0">

            <div class="space-y-2">
                <label class="block text-[11px] font-black text-gray-400 ml-3 uppercase tracking-widest italic">발전소 명 *</label>
                <input type="text" name="name" placeholder="예: 솔라가드 대전 제1발전소" class="w-full bg-gray-50 border-2 border-gray-50 rounded-[25px] p-5 outline-none focus:border-yellow-400 focus:bg-white transition-all font-bold text-gray-700" required>
            </div>

            <div class="space-y-2">
                <label class="block text-[11px] font-black text-gray-400 ml-3 uppercase tracking-widest italic">주소 *</label>
                <div class="flex gap-3">
                    <input type="text" id="addressDisplay" placeholder="주소를 검색해 주세요" class="flex-1 bg-gray-50 border-2 border-gray-50 rounded-[25px] p-5 outline-none font-bold text-gray-700" readonly>
                    <input type="hidden" id="address" name="address">
                    <button type="button" onclick="execDaumPostcode()" class="px-8 bg-gray-900 text-white font-black rounded-[25px] hover:bg-black transition-all active:scale-95 italic uppercase text-[10px]">검색</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[11px] font-black text-gray-400 ml-3 uppercase tracking-widest italic">행정동 코드</label>
                <input type="text" id="districtCodeDisplay" placeholder="자동 표시" class="w-full bg-gray-50 border-2 border-gray-50 rounded-[25px] p-5 outline-none font-[900] text-center text-gray-700 italic" readonly>
                <input type="hidden" id="districtCode" name="districtCode">
            </div>

            <div class="grid grid-cols-2 gap-6 pt-2">
                <!-- azimuth의 기본값 value=0 범위-90~90, tilt의 기본값 value=30 범위 20~40 추가 -->
                <input type="number" name="azimuth" placeholder="방향 0°" value="0" min="-90" max="90" class="w-full bg-gray-50 border-2 border-gray-50 rounded-[25px] p-5 text-center font-black italic" required>
                <input type="number" name="tilt" placeholder="각도 30°" value="30" min="20" max="40" class="w-full bg-gray-50 border-2 border-gray-50 rounded-[25px] p-5 text-center font-black italic text-blue-600" required>
            </div>

            <button type="submit" class="w-full py-5 bg-yellow-400 text-black rounded-[28px] font-[900] text-lg shadow-xl shadow-yellow-400/20 hover:bg-yellow-500 transition-all active:scale-95 italic uppercase mt-4">
                등록하기
            </button>
        </form>
    </div>
</div>

<!-- 인버터 등록 -->
<div th:fragment="inverterModal" id="inverterModal" class="fixed inset-0 z-[100] hidden items-center justify-center modal-bg">
    <div class="bg-white rounded-[45px] shadow-2xl w-[550px] p-12 relative modal-content animate-in fade-in zoom-in duration-300">
        <button type="button" onclick="closeModal('inverterModal')" class="absolute top-10 right-10 text-gray-300 hover:text-gray-600 transition-all active:scale-90 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <header class="mb-10 text-center border-b border-gray-50 pb-8">
            <h3 class="text-3xl font-[900] text-gray-800 tracking-tighter italic uppercase">인버터 등록</h3>
            <p class="text-[11px] text-gray-400 mt-2 font-black uppercase tracking-widest italic">Inverter Configuration</p>
        </header>

        <form class="space-y-6" id="inverterForm" method="post">
            <input type="hidden" name="plantId" th:value="${selectedPlant != null ? selectedPlant.id : null}">
            <input type="hidden" name="serial" th:value="${serial}">
            <input type="hidden" name="type" value="DUMMY">

            <div class="space-y-2">
                <label class="block text-[11px] font-black text-gray-400 ml-3 uppercase tracking-widest italic">발전소명 *</label>
                <input type="text"
                       th:value="${selectedPlant != null ? selectedPlant.name : ''}"
                       placeholder="발전소를 먼저 등록하세요"
                       readonly
                       class="w-full bg-gray-100 border-2 border-transparent rounded-[25px] p-5 font-bold text-gray-500 cursor-not-allowed">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <input type="number" step="0.001" name="ratedCapacity" placeholder="용량(kW)" class="w-full bg-gray-50 border-2 border-gray-50 rounded-[25px] p-6 text-center font-[900] text-2xl italic" required>
                <input type="number" step="0.01" name="efficiency" placeholder="효율(%)" class="w-full bg-gray-50 border-2 border-gray-50 rounded-[25px] p-6 text-center font-[900] text-2xl text-blue-600 italic" value="100.00">
            </div>

            <button type="submit"
                    th:classappend="${selectedPlant == null} ? 'btn-disabled' : ''"
                    class="w-full py-5 bg-yellow-400 text-black rounded-[28px] font-[900] text-lg shadow-xl shadow-yellow-400/20 hover:bg-yellow-500 transition-all active:scale-95 italic uppercase mt-4">
                <span th:text="${selectedPlant == null} ? '발전소 등록 필요' : '인버터 등록하기'"></span>
            </button>
        </form>
    </div>
</div>

<!-- 패널 등록 -->
<div th:fragment="panelModal" id="panelModal" class="fixed inset-0 z-[100] hidden items-center justify-center modal-bg">
    <div class="bg-white rounded-[45px] shadow-2xl w-[650px] p-12 relative modal-content animate-in fade-in zoom-in duration-300">
        <button type="button" onclick="closeModal('panelModal')" class="absolute top-10 right-10 text-gray-300 hover:text-gray-600 active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <h3 class="text-3xl font-[900] text-gray-800 text-center italic uppercase mb-8">패널 등록</h3>

        <form class="space-y-5" id="panelForm" method="post">
            <input type="hidden" name="inverterId" th:value="${inverterId}">

            <input type="text" th:value="${plantName}" placeholder="발전소명" readonly class="w-full bg-gray-100 rounded-[25px] p-5 font-bold text-gray-500">

            <div class="grid grid-cols-2 gap-6">
                <input type="text" name="modelName" placeholder="모델명" class="w-full bg-gray-50 rounded-[25px] p-5 font-black text-center italic" required>
                <input type="number" name="count" placeholder="수량" class="w-full bg-gray-50 rounded-[25px] p-5 font-black text-center text-blue-600 italic" min="1" value="1" required>
            </div>

            <button type="submit" th:classappend="${inverterId == null} ? 'btn-disabled' : ''" class="w-full py-5 bg-yellow-400 text-black rounded-[28px] font-black italic uppercase">
                패널 등록하기
            </button>
        </form>
    </div>
</div>

<!-- 로그아웃 -->
<div th:fragment="logoutModal" id="logoutModal" class="fixed inset-0 z-[200] hidden items-center justify-center modal-bg">
    <div class="bg-white rounded-[40px] shadow-2xl w-[400px] p-12 relative modal-content animate-in fade-in zoom-in duration-300 text-center">
        <div class="w-20 h-20 bg-gray-50 rounded-[30px] flex items-center justify-center mx-auto mb-8 text-4xl">📤</div>
        <h3 class="text-2xl font-[900] text-gray-800 tracking-tighter italic uppercase mb-2">로그아웃</h3>
        <p class="text-sm text-gray-400 font-bold mb-10 uppercase tracking-widest italic">정말로 로그아웃 하시겠습니까?</p>
        <div class="flex gap-3">
            <button type="button" onclick="closeModal('logoutModal')" class="flex-1 py-4 bg-gray-100 text-gray-400 font-black rounded-2xl hover:bg-gray-200 transition-all uppercase italic text-sm">아니요</button>
            <form th:action="@{/logout}" method="post" class="flex-[2]">
                <button type="submit" class="w-full py-4 bg-yellow-400 text-black font-[900] rounded-2xl shadow-lg hover:bg-yellow-500 transition-all active:scale-95 uppercase italic text-sm">네</button>
            </form>
        </div>
    </div>
</div>

<!-- 공용 확인 모달 -->
<div th:fragment="confirmModal" id="confirmModal" class="fixed inset-0 z-[130] hidden items-center justify-center modal-bg">
    <div class="bg-white rounded-[45px] shadow-2xl w-[470px] p-12 relative modal-content animate-in fade-in zoom-in duration-300 text-center">
        <div class="w-20 h-20 bg-yellow-50 rounded-[28px] flex items-center justify-center mx-auto mb-8 text-4xl">⚠️</div>
        <h3 class="text-2xl font-[900] text-gray-800 italic uppercase mb-3 tracking-tighter" id="confirmTitle">확인</h3>
        <p id="confirmMessage" class="text-gray-500 font-bold mb-10 leading-relaxed">정말로 진행하시겠습니까?</p>

        <div class="flex gap-3">
            <button type="button" onclick="closeModal('confirmModal')" class="flex-1 py-4 bg-gray-100 text-gray-500 font-black rounded-2xl hover:bg-gray-200 transition-all uppercase italic text-sm">
                취소
            </button>
            <button type="button" id="confirmActionButton" class="flex-[1.4] py-4 bg-yellow-400 text-black font-[900] rounded-2xl shadow-lg hover:bg-yellow-500 transition-all active:scale-95 uppercase italic text-sm">
                진행
            </button>
        </div>
    </div>
</div>

<!-- 비밀번호 변경 -->
<div th:fragment="passwordModal" id="passwordModal" class="fixed inset-0 z-[100] hidden items-center justify-center modal-bg">
    <div class="bg-white rounded-[45px] shadow-2xl w-[500px] p-12 relative modal-content animate-in fade-in zoom-in duration-300">
        <button type="button" onclick="closeModal('passwordModal')" class="absolute top-10 right-10 text-gray-300 hover:text-gray-600 active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <h3 class="text-3xl font-[900] text-gray-800 text-center italic uppercase mb-8">비밀번호 변경</h3>
        <form th:action="@{/mypage/password}" class="space-y-4" id="passwordForm" method="post">
            <input type="password" name="currentPassword" placeholder="현재 비밀번호" class="w-full bg-gray-50 rounded-[25px] p-5 font-bold outline-none border-2 border-transparent focus:border-yellow-400 transition-all" required>
            <input type="password" name="newPassword" placeholder="새 비밀번호" class="w-full bg-gray-50 rounded-[25px] p-5 font-bold outline-none border-2 border-transparent focus:border-yellow-400 transition-all" required>
            <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인" class="w-full bg-gray-50 rounded-[25px] p-5 font-bold outline-none border-2 border-transparent focus:border-yellow-400 transition-all" required>
            <button type="submit" class="w-full py-5 bg-yellow-400 text-black rounded-[28px] font-black italic uppercase mt-4 shadow-lg shadow-yellow-400/20 hover:bg-yellow-500 active:scale-95 transition-all">
                비밀번호 변경
            </button>
        </form>
    </div>
</div>

<th:block th:fragment="script">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script th:inline="javascript">
        function openModal(id) {
            const m = document.getElementById(id);
            if (m) {
                m.classList.remove('hidden');
                m.classList.add('flex');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            if (m) {
                m.classList.remove('flex');
                m.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        }

        function openConfirmModal(message, onConfirm, title = '확인', buttonText = '진행') {
            const titleEl = document.getElementById('confirmTitle');
            const messageEl = document.getElementById('confirmMessage');
            const actionButton = document.getElementById('confirmActionButton');

            if (titleEl) titleEl.textContent = title;
            if (messageEl) messageEl.textContent = message;

            if (actionButton) {
                actionButton.textContent = buttonText;
                actionButton.onclick = async function () {
                    try {
                        await onConfirm();
                    } catch (e) {
                        console.error(e);
                    }
                };
            }

            openModal('confirmModal');
        }

        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function (data) {
                    const addressDisplayField = document.getElementById('addressDisplay');
                    const addressField = document.getElementById('address');
                    const districtCodeDisplayField = document.getElementById('districtCodeDisplay');
                    const districtCodeField = document.getElementById('districtCode');
                    const provinceCodeField = document.getElementById('provinceCode');

                    const districtCode = (data.hcode || data.bcode || '').substring(0, 5);
                    const provinceCode = districtCode.substring(0, 2);

                    if (addressDisplayField) addressDisplayField.value = data.address;
                    if (addressField) addressField.value = data.address;

                    if (districtCodeDisplayField) {
                        districtCodeDisplayField.value = districtCode;
                        districtCodeDisplayField.classList.add('bg-yellow-50');
                    }

                    if (districtCodeField) districtCodeField.value = districtCode;
                    if (provinceCodeField) provinceCodeField.value = provinceCode;
                }
            }).open();
        }

        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-bg')) {
                closeModal(e.target.id);
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            const plantForm = document.getElementById('plantForm');
            if (plantForm) {
                plantForm.addEventListener('submit', function (e) {
                    const address = document.getElementById('address')?.value?.trim();
                    const districtCode = document.getElementById('districtCode')?.value?.trim();

                    if (!address || !districtCode) {
                        e.preventDefault();
                        alert('주소 검색을 완료해 주세요.');
                    }
                });
            }
        });
    </script>
</th:block>

</html>
