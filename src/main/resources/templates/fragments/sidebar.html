<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<aside th:fragment="sidebar" class="fixed inset-y-0 left-0 w-64 bg-[#111827] text-gray-300 flex flex-col shadow-2xl z-[100]">
    <div class="p-6 flex items-center space-x-3 border-b border-gray-700">
        <div class="bg-yellow-400 p-2 rounded-lg text-black font-bold text-xl">☀</div>
        <div>
            <h1 class="text-xl font-bold text-white tracking-tight">SolarGuard</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Control System</p>
        </div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto custom-scroll">
        <a href="/dashboard" class="flex items-center space-x-3 p-3.5 hover:bg-gray-800 rounded-2xl transition-all group">
            <span class="group-hover:scale-110 transition-transform">📊</span>
            <span class="font-bold text-sm tracking-tighter">실시간 대시보드</span>
        </a>
        <a href="/chart" class="flex items-center space-x-3 p-3.5 hover:bg-gray-800 rounded-2xl transition-all group">
            <span class="group-hover:scale-110 transition-transform">📈</span>
            <span class="font-bold text-sm tracking-tighter">통계 / 차트 분석</span>
        </a>
        <a href="/alerts" class="flex items-center space-x-3 p-3.5 hover:bg-gray-800 rounded-2xl transition-all group">
            <span class="group-hover:scale-110 transition-transform">🔔</span>
            <span class="font-bold text-sm tracking-tighter">시스템 알림 내역</span>
        </a>
        <a href="/report" class="flex items-center space-x-3 p-3.5 hover:bg-gray-800 rounded-2xl transition-all group">
            <span class="group-hover:scale-110 transition-transform">📋</span>
            <span class="font-bold text-sm tracking-tighter">월간 관제 리포트</span>
        </a>

        <div class="pt-8 pb-2 text-[10px] text-gray-500 uppercase px-4 font-black tracking-[0.2em] italic">System Settings</div>

        <a href="/mypage" class="flex items-center space-x-3 p-3.5 hover:bg-gray-800 rounded-2xl transition-all group">
            <span class="group-hover:scale-110 transition-transform">👤</span>
            <span class="font-bold text-sm tracking-tighter">마이 페이지</span>
        </a>

        <button onclick="openModal('logoutModal')"
                class="w-full flex items-center space-x-3 p-3.5 hover:bg-red-500/10 hover:text-red-400 rounded-2xl transition-all text-gray-400 font-bold text-sm text-left border-none bg-transparent cursor-pointer group">
            <span class="group-hover:translate-x-1 transition-transform">📤</span>
            <span class="tracking-tighter">로그아웃</span>
        </button>
    </nav>

    <div class="p-4 bg-[#0f172a] m-4 rounded-[25px] border border-gray-800 space-y-3">

        <div onclick="openModal('plantModal')"
             class="group cursor-pointer p-4 bg-gray-900 rounded-[20px] border border-gray-800 hover:border-yellow-400/50 hover:bg-gray-800/50 transition-all duration-300 shadow-lg">

            <div class="flex flex-col">
                <p class="text-gray-500 text-[9px] font-black uppercase italic tracking-widest mb-2 flex items-center gap-2">
                    <span th:if="${selectedPlant != null}" class="w-1.5 h-1.5 bg-yellow-400 rounded-full animate-pulse"></span>
                    Selected Plant
                </p>

                <!-- 선택된 발전소 있음 -->
                <div th:if="${selectedPlant != null}">
                    <h3 class="text-white font-[900] text-sm mb-1 italic uppercase tracking-tighter truncate group-hover:text-yellow-400 transition-colors">
                        🏢 <span th:text="${selectedPlant.name}">발전소명</span>
                    </h3>

                    <div class="flex items-center gap-2 text-gray-500 text-[10px] font-bold">
                        <span th:text="${selectedPlant.address}" class="truncate">주소</span>
                    </div>

                    <div class="mt-3 flex items-center justify-between">
                    <span class="text-[9px] text-gray-500 font-black uppercase tracking-widest">
                        <span th:text="${plantList != null ? #lists.size(plantList) : 0}">0</span> Plants Registered
                    </span>
                        <span class="text-[10px] text-yellow-400 font-black uppercase italic">
                        Change
                    </span>
                    </div>
                </div>

                <!-- 선택된 발전소 없음 -->
                <div th:if="${selectedPlant == null}" class="py-1">
                    <p class="text-gray-600 text-[11px] font-bold italic uppercase">
                        발전소를 선택하세요
                    </p>

                    <div class="mt-3 flex items-center justify-between">
                    <span class="text-[9px] text-gray-500 font-black uppercase tracking-widest">
                        <span th:text="${plantList != null ? #lists.size(plantList) : 0}">0</span> Plants Registered
                    </span>
                        <span class="text-[10px] text-yellow-400 font-black uppercase italic">
                        Select
                    </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="p-4 bg-gray-900/30 rounded-[20px] border border-gray-800/50 text-[11px]">
            <p class="text-red-400/80 font-black mb-2 flex items-center gap-1.5 uppercase italic tracking-wider">
                <span class="w-1 h-3 bg-red-500/50 rounded-full"></span> 문의
            </p>
            <div class="space-y-1.5 font-bold text-gray-500 tracking-tight">
                <p class="flex justify-between">Tel <span class="text-gray-400">043-123-4567</span></p>
                <p class="flex justify-between font-medium">Email <span class="text-gray-400 text-[10px]">SolarGuard@...</span></p>
            </div>
        </div>
    </div>
</aside>

</html>
