<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>SolarGuard | Monthly Statistics</title>

    <th:block layout:fragment="css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            .chart-container {
                position: relative;
                width: 100%;
                height: 100%;
                min-height: 0;
            }
        </style>
    </th:block>
</head>

<body>
<div layout:fragment="content">
    <div class="mt-10 bg-white rounded-[50px] shadow-sm border border-gray-100 p-12 flex-1 flex flex-col min-h-[82vh]">

        <!-- 헤더 -->
        <div class="mb-10 px-2 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-black text-gray-800 tracking-tighter italic uppercase">발전 통계 분석</h2>
                <div class="flex items-center mt-1">
                    <p class="text-sm text-gray-400 font-bold uppercase tracking-widest">
                        기간 누적 발전량, 전월대비 증감률, 월 평균 발전량, 기상 보정 기대값, 가동 중지시간을 분석합니다.
                    </p>
                </div>
            </div>
        </div>

        <!-- 필터 영역 -->
        <form method="get" th:action="@{/chart/monthly}" id="chartMonthlyFilterForm" class="mb-10 px-2 flex flex-wrap items-center gap-4">
            <div class="bg-gray-50 p-1.5 rounded-2xl border border-gray-100 flex items-center shadow-sm">
                <a th:href="@{/chart}"
                   class="px-10 py-3.5 text-gray-400 font-black hover:text-gray-600 transition-colors italic uppercase tracking-wide">
                    일별
                </a>

                <a th:href="@{/chartMonthly}"
                   class="px-10 py-3.5 bg-yellow-400 text-black rounded-xl font-black shadow-lg shadow-yellow-400/20 italic uppercase tracking-wide">
                    월별
                </a>
            </div>

            <div class="flex items-center gap-3">
                <button type="button"
                        id="prevMonthBtn"
                        class="bg-white px-6 py-3.5 rounded-2xl border border-gray-200 text-gray-700 font-black hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                    이전월
                </button>

                <button type="button"
                        id="currentMonthBtn"
                        class="bg-yellow-400 px-6 py-3.5 rounded-2xl text-black font-black hover:brightness-95 transition-all shadow-sm active:scale-95">
                    이번달
                </button>

                <button type="button"
                        id="nextMonthBtn"
                        class="bg-white px-6 py-3.5 rounded-2xl border border-gray-200 text-gray-700 font-black hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                    다음월
                </button>

                <div class="bg-gray-50 rounded-2xl border border-gray-100 shadow-sm px-6 py-3.5 flex items-center">
                    <input type="month"
                           id="selectedMonth"
                           name="selectedMonth"
                           th:value="${selectedMonth != null ? selectedMonth : #temporals.format(#temporals.createNow(), 'yyyy-MM')}"
                           th:attr="max=${#temporals.format(#temporals.createNow(), 'yyyy-MM')}"
                           class="bg-transparent font-black text-gray-700 outline-none italic uppercase">
                </div>
            </div>
        </form>

        <!-- 요약 카드 -->
        <div class="grid grid-cols-5 gap-6 mb-10">
            <th:block th:if="${statsSummary != null and !#lists.isEmpty(statsSummary)}">
                <div th:each="stat : ${statsSummary}"
                     class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100 flex flex-col justify-center min-h-[210px]">

                    <div class="flex items-center mb-6 italic uppercase">
                        <span class="w-1.5 h-6 bg-yellow-400 rounded-full mr-3"></span>
                        <span class="text-lg font-black text-gray-800"
                              th:text="${stat.title}">
                    Analysis Item
                </span>
                    </div>

                    <div class="bg-gray-50 rounded-2xl min-h-[100px] px-6 py-6 flex items-center justify-center text-center">
                <span class="text-2xl font-black text-gray-900 leading-none italic"
                      th:text="${stat.value}">
                    0
                </span>
                    </div>
                </div>
            </th:block>

            <th:block th:if="${statsSummary == null or #lists.isEmpty(statsSummary)}">
                <div th:each="i : ${#numbers.sequence(1, 5)}"
                     class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100 flex flex-col justify-center min-h-[210px]">
                    <div class="flex items-center mb-6 italic uppercase">
                        <span class="w-1.5 h-6 bg-yellow-400 rounded-full mr-3"></span>
                        <span class="text-lg font-black text-gray-300">WAITING DATA</span>
                    </div>
                    <div class="bg-gray-50 rounded-2xl min-h-[100px] px-6 py-6 flex items-center justify-center text-center">
                        <span class="text-2xl font-black text-gray-300 leading-none italic">--</span>
                    </div>
                </div>
            </th:block>
        </div>

        <!-- 차트 영역 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-1 min-h-[520px]">
            <!-- 발전량 추이(월별) -->
            <div class="bg-white p-10 rounded-[45px] shadow-sm border border-gray-100 flex flex-col transition-all">
                <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center italic uppercase">
                    <span class="w-1.5 h-6 bg-yellow-400 rounded-full mr-3"></span>
                    월별 발전량 추이
                </h3>

                <div class="flex-1 chart-container flex items-center justify-center min-h-0">
                    <canvas id="monthlyGenChart"
                            th:if="${generationTrend != null and !#lists.isEmpty(generationTrend)}"></canvas>

                    <div th:if="${generationTrend == null or #lists.isEmpty(generationTrend)}" class="text-center">
                        <div class="text-5xl mb-4 opacity-20">📈</div>
                        <p class="text-gray-400 font-bold italic uppercase">월별 발전량 데이터가 없습니다.</p>
                        <p class="text-[10px] text-gray-300 uppercase tracking-widest mt-2">
                            Waiting for monthly generation statistics...
                        </p>
                    </div>
                </div>
            </div>

            <!-- 기상 조건별 발전 분포(월별) -->
            <div class="bg-white p-10 rounded-[45px] shadow-sm border border-gray-100 flex flex-col transition-all">
                <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center italic uppercase">
                    <span class="w-1.5 h-6 bg-yellow-400 rounded-full mr-3"></span>
                    월별 기상 조건별 발전 효율
                </h3>

                <div class="flex-1 chart-container flex items-center justify-center min-h-0">
                    <canvas id="monthlyWeatherChart"
                            th:if="${weatherDistribution != null and !#lists.isEmpty(weatherDistribution)}"></canvas>

                    <div th:if="${weatherDistribution == null or #lists.isEmpty(weatherDistribution)}" class="text-center">
                        <div class="text-5xl mb-4 opacity-20">☁️</div>
                        <p class="text-gray-400 font-bold italic uppercase">월별 기상 분포 데이터가 없습니다.</p>
                        <p class="text-[10px] text-gray-300 uppercase tracking-widest mt-2">
                            Waiting for monthly weather distribution logs...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        const generationTrend = /*[[${generationTrend}]]*/ [];
        const weatherDistribution = /*[[${weatherDistribution}]]*/ [];

        const weatherMap = {
            "맑음": "☀️ 맑음",
            "구름 조금": "⛅ 구름 조금",
            "흐림": "☁️ 흐림",
            "비": "🌧️ 비",
            "눈": "❄️ 눈"
        };

        const weatherColorMap = {
            "맑음": "#f59e0b",
            "구름 조금": "#eab308",
            "흐림": "#94a3b8",
            "비": "#2563eb",
            "눈": "#93c5fd"
        };

        const monthlyGenCtx = document.getElementById('monthlyGenChart');
        if (monthlyGenCtx && Array.isArray(generationTrend) && generationTrend.length > 0) {
            new Chart(monthlyGenCtx, {
                type: 'line',
                data: {
                    labels: generationTrend.map(item => item.label || ''),
                    datasets: [{
                        label: '발전량 (kWh)',
                        data: generationTrend.map(item => item.value ?? 0),
                        borderColor: '#facc15',
                        backgroundColor: 'rgba(250, 204, 21, 0.12)',
                        fill: true,
                        tension: 0.35,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                boxWidth: 8,
                                font: {
                                    weight: 'bold',
                                    size: 11
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f8fafc' },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });
        }

        const monthlyWeatherCtx = document.getElementById('monthlyWeatherChart');
        if (monthlyWeatherCtx && Array.isArray(weatherDistribution) && weatherDistribution.length > 0) {
            new Chart(monthlyWeatherCtx, {
                type: 'bar',
                data: {
                    labels: weatherDistribution.map(item => weatherMap[item.label] || item.label || '기타'),
                    datasets: [{
                        label: '평균 발전 성능 (%)',
                        data: weatherDistribution.map(item => item.value ?? 0),
                        backgroundColor: weatherDistribution.map(item => weatherColorMap[item.label] || '#3b82f6'),
                        borderRadius: 12,
                        barPercentage: 0.55
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                boxWidth: 8,
                                font: {
                                    weight: 'bold',
                                    size: 11
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: '#f8fafc' },
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                },
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });
        }

        const form = document.getElementById('chartMonthlyFilterForm');
        const monthInput = document.getElementById('selectedMonth');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const currentMonthBtn = document.getElementById('currentMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');

        function formatMonth(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}`;
        }

        function parseMonthValue(value) {
            if (!value || !value.includes('-')) return null;
            const [year, month] = value.split('-').map(Number);
            if (!year || !month) return null;
            return new Date(year, month - 1, 1);
        }

        function changeMonth(diff) {
            if (!monthInput || !monthInput.value) return;

            const current = parseMonthValue(monthInput.value);
            if (!current) return;

            current.setMonth(current.getMonth() + diff);

            const now = new Date();
            const maxMonth = new Date(now.getFullYear(), now.getMonth(), 1);

            if (current > maxMonth) {
                monthInput.value = formatMonth(maxMonth);
            } else {
                monthInput.value = formatMonth(current);
            }

            form.submit();
        }

        if (monthInput) {
            monthInput.addEventListener('change', function () {
                form.submit();
            });
        }

        if (prevMonthBtn) {
            prevMonthBtn.addEventListener('click', function () {
                changeMonth(-1);
            });
        }

        if (currentMonthBtn) {
            currentMonthBtn.addEventListener('click', function () {
                monthInput.value = formatMonth(new Date());
                form.submit();
            });
        }

        if (nextMonthBtn) {
            nextMonthBtn.addEventListener('click', function () {
                changeMonth(1);
            });
        }
        /*]]>*/
    </script>
</th:block>
</body>
</html>
