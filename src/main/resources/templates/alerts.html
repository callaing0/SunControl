<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<div layout:fragment="content">
    <div id="toastContainer" class="fixed top-10 right-10 z-[110] flex flex-col gap-4"></div>

    <div class="mt-10 bg-white rounded-[50px] shadow-sm border border-gray-100 p-12 flex-1 flex flex-col min-h-[82vh]">
        <div class="mb-10 px-2 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-[900] text-gray-800 tracking-tighter italic uppercase">알람 이력</h2>
                <p class="text-sm text-gray-400 font-bold mt-1 tracking-tight">실시간 장애 추적 시스템</p>
            </div>

            <button th:if="${not #lists.isEmpty(alerts)}"
                    th:onclick="|testPush(${alerts[0].status})|"
                    class="bg-red-500 text-white px-6 py-2 rounded-full font-black text-xs hover:bg-black transition-all shadow-lg">
                🚨 즉시 알림 테스트
            </button>

            <button th:if="${#lists.isEmpty(alerts)}"
                    onclick="testPush(0)"
                    class="bg-red-500 text-white px-6 py-2 rounded-full font-black text-xs hover:bg-black transition-all shadow-lg">
                🚨 즉시 알림 테스트
            </button>

            <div th:if="${alerts != null and !#lists.isEmpty(alerts)}" class="text-right">
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-5 py-2.5 rounded-full border border-blue-100 uppercase tracking-widest shadow-sm">
                    Total Logs: <span th:text="${#lists.size(alerts)}">0</span>
                </span>
            </div>
        </div>

        <div class="rounded-[35px] border border-gray-100 overflow-hidden flex flex-col flex-1 bg-white">
            <div class="bg-gray-900 text-white flex text-[13px] font-black py-6 px-12 items-center uppercase tracking-tighter">
                <div class="w-24 text-center">LOG ID</div>
                <div class="w-32 text-center border-l border-gray-700">INVERTER ID</div>
                <div class="flex-1 text-center border-l border-gray-700">장애 감지 시간</div>
                <div class="flex-1 text-center border-l border-gray-700">조치 완료 시간</div>
                <div class="w-40 text-center border-l border-gray-700">위치</div>
                <div class="w-24 text-center border-l border-gray-700">상태</div>
            </div>

            <div class="flex-1 flex flex-col relative divide-y divide-gray-50 overflow-y-auto custom-scroll">
                <th:block th:if="${alerts != null and !#lists.isEmpty(alerts)}">
                    <div th:each="alert : ${alerts}" class="flex py-8 px-12 text-center items-center text-xl font-black text-gray-700 hover:bg-gray-50">
                        <div class="w-24 text-base font-bold text-gray-400" th:text="${alert.id}">1</div>
                        <div class="w-32 text-base font-bold text-blue-600" th:text="${alert.getInverterNumber()}">260401</div>
                        <div class="flex-1 text-base text-gray-800"
                             th:text="${alert.createdAt != null ? #temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm:ss') : '--'}"></div>
                        <div class="flex-1 text-base text-gray-400"
                             th:text="${alert.resolvedAt != null ? #temporals.format(alert.resolvedAt, 'yyyy-MM-dd HH:mm:ss') : '진행 중...'}"></div>
                        <div class="w-40 text-sm font-bold text-gray-600 uppercase"
                             th:text="${alert.location != null ? alert.location : '-'}"></div>
                        <div class="w-24">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border"
                                  th:classappend="${alert.status == 0 ? 'bg-red-50 text-red-500 border-red-100' : 'bg-green-50 text-green-500 border-green-100'}"
                                  th:text="${alert.status == 0 ? '대기' : '조치 완료'}">대기</span>
                        </div>
                    </div>
                </th:block>

                <div th:if="${alerts == null or #lists.isEmpty(alerts)}" class="flex-1 flex items-center justify-center text-gray-300 font-bold italic text-3xl">
                    NO ALARM LOGS DETECTED
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /**
         * ✅ 테스트 푸시 완벽 차단 로직
         */
        window.testPush = function(currentStatus) {
            console.log("현재 감지된 상태값:", currentStatus);

            // 상태가 1(조치 완료)이면 절대 알림을 띄우지 않고 함수 종료
            if (Number(currentStatus) === 1) {
                console.warn("차단: 이미 조치 완료된 상태입니다.");
                return;
            }

            // 0(대기)일 때만 실행
            showEmergencyToast("🚨 [장애발생] 인버터:260401 | 통신이상 감지됨");
        };

        function connectSSE() {
            const eventSource = new EventSource('/api/notifications/subscribe');

            eventSource.addEventListener('alertUpdate', function(event) {
                const msg = event.data;
                // 메시지에 '조치'나 '완료'가 포함되면 푸시 안 띄움
                if (!/조치|완료|정상/.test(msg)) {
                    showEmergencyToast(msg);
                }
            });

            eventSource.onerror = function() {
                eventSource.close();
                setTimeout(connectSSE, 3000);
            };
        }

        connectSSE();

        function showEmergencyToast(message) {
            const container = document.getElementById('toastContainer');
            if(!container) return;

            const toast = document.createElement('div');
            toast.className = "bg-red-500 text-white p-6 rounded-[30px] shadow-2xl border-4 border-red-700 min-w-[400px] animate-bounce mb-4 cursor-pointer hover:scale-105 transition-transform";

            toast.innerHTML = `
                <div class="flex items-center gap-5">
                    <div class="text-4xl">🚨</div>
                    <div class="flex-1">
                        <h4 class="text-[14px] font-[900] uppercase italic tracking-tighter text-white opacity-80">Critical Alert</h4>
                        <p class="text-[13px] font-bold mt-1 text-white break-all leading-relaxed">${message}</p>
                        <p class="text-[10px] text-white mt-2 font-black uppercase tracking-widest opacity-60 italic text-right">Click to View</p>
                    </div>
                </div>
            `;

            toast.onclick = () => location.reload();
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 500);
            }, 8000);
        }
    </script>
</th:block>
</html>
