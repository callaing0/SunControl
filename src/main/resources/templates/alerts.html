<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<div layout:fragment="content">
    <div id="toastContainer" class="fixed top-10 right-10 z-[110] flex flex-col gap-4"></div>

    <div class="mt-10 bg-white rounded-[50px] shadow-sm p-12 flex-1 flex flex-col">
        <h2 class="text-3xl font-[900] text-gray-800 italic uppercase">실시간 알림 테스트</h2>
        <p class="text-sm text-gray-400 font-bold mb-10">버튼을 누르면 우측 상단에 강렬한 빨간색 알림이 떠야 합니다.</p>

        <div class="rounded-[35px] border border-gray-100 overflow-hidden bg-white">
            <div class="bg-gray-900 text-white flex font-black py-4 px-12 text-center uppercase">
                <div class="w-20">ID</div>
                <div class="flex-1">내용</div>
                <div class="w-48">알림 테스트</div>
            </div>

            <div class="divide-y divide-gray-50">
                <th:block th:each="alert : ${alerts}">
                    <div class="flex py-6 px-12 text-center items-center hover:bg-gray-50">
                        <div class="w-20 font-bold text-gray-400" th:text="${alert.id}">0</div>
                        <div class="flex-1 text-gray-700 font-medium">실시간 장애 로그 데이터</div>
                        <div class="w-48">
                            <button th:onclick="|sendTestNotify(${alert.id})|"
                                    class="px-6 py-2 rounded-full bg-blue-500 text-white text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all">
                                알림 쏘기
                            </button>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            console.log("SSE 구독 시작...");
            const eventSource = new EventSource('/api/notifications/subscribe');

            eventSource.addEventListener('alertUpdate', (event) => {
                console.log("알림 수신:", event.data);
                showToast(event.data);
            });

            eventSource.onmessage = (event) => console.log("기본 메시지:", event.data);
            eventSource.onerror = (err) => console.error("SSE 연결 실패:", err);
        });

        // ✅ 빨간 배경 + 삐용이 적용된 알림창
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            if(!container) return;

            const toast = document.createElement('div');

            // bg-red-600으로 배경을 새빨갛게, 글자는 text-white로 변경
            toast.className = "bg-red-600 text-white p-6 rounded-[25px] shadow-2xl border-2 border-red-800 min-w-[350px] animate-bounce mb-4 transition-all duration-500";

            toast.innerHTML = `
                <div class="flex items-center gap-5">
                    <div class="text-4xl animate-pulse">🚨</div>
                    <div class="flex-1">
                        <h4 class="text-white font-[900] text-sm uppercase italic tracking-tighter">Emergency Alert</h4>
                        <p class="text-red-50 text-xs font-bold mt-1">${message}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-red-200 hover:text-white text-xl">✕</button>
                </div>
            `;

            container.appendChild(toast);

            // 5초 뒤 옆으로 슥 사라지며 삭제
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        function sendTestNotify(id) {
            // 버튼 클릭 시 서버의 알림 API 호출
            fetch(`/api/alerts/test-notify/${id}`, { method: 'POST' })
                    .then(res => console.log("서버에 알림 요청 보냄"));
        }
    </script>
</th:block>
</html>
