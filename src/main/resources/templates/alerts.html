<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<div layout:fragment="content">
    <div id="toastContainer" class="fixed top-10 right-10 z-[110] flex flex-col gap-4"></div>

    <div class="mt-10 bg-white rounded-[50px] shadow-sm border border-gray-100 p-12 flex-1 flex flex-col min-h-[82vh]">
        <div class="mb-10 px-2 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-[900] text-gray-800 tracking-tighter italic uppercase">알람 이력</h2>
                <p class="text-sm text-gray-400 font-bold mt-1 tracking-tight">실시간 장애 추적 시스템</p>
            </div>

            <button onclick="testPush()" class="bg-red-500 text-white px-6 py-2 rounded-full font-black text-xs hover:bg-black transition-all shadow-lg">
                🚨 즉시 알림 테스트
            </button>

            <div th:if="${alerts != null and !#lists.isEmpty(alerts)}" class="text-right">
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-5 py-2.5 rounded-full border border-blue-100 uppercase tracking-widest shadow-sm">
                    Total Logs: <span th:text="${#lists.size(alerts)}">0</span>
                </span>
            </div>
        </div>

        <div class="rounded-[35px] border border-gray-100 overflow-hidden flex flex-col flex-1 bg-white">
            <div class="bg-gray-900 text-white flex text-[13px] font-black py-6 px-12 items-center uppercase tracking-tighter">
                <div class="w-32 text-center">Log ID</div>
                <div class="flex-1 text-center border-l border-gray-700">장애 감지 시간</div>
                <div class="flex-1 text-center border-l border-gray-700">조치 완료 시간</div>
                <div class="w-40 text-center border-l border-gray-700">위치</div>
                <div class="w-32 text-center border-l border-gray-700">상태</div>
            </div>

            <div class="flex-1 flex flex-col relative divide-y divide-gray-50 overflow-y-auto custom-scroll">
                <th:block th:if="${alerts != null and !#lists.isEmpty(alerts)}">
                    <div th:each="alert : ${alerts}" class="flex py-8 px-12 text-center items-center text-xl font-black text-gray-700 hover:bg-gray-50">
                        <div class="w-32 text-base font-bold text-gray-400" th:text="${alert.id}">L-0000</div>
                        <div class="flex-1 text-base text-gray-800" th:text="${alert.createdAt != null ? #temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm:ss') : '--'}"></div>
                        <div class="flex-1 text-base text-gray-400" th:text="${alert.resolvedAt != null ? #temporals.format(alert.resolvedAt, 'yyyy-MM-dd HH:mm:ss') : '진행 중...'}"></div>
                        <div class="w-40 text-sm font-bold text-gray-600 uppercase" th:text="${alert.location}"></div>
                        <div class="w-32">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border"
                                  th:classappend="${alert.status == 0 or alert.statusDescription == '장애' ? 'bg-red-50 text-red-500 border-red-100' : 'bg-green-50 text-green-500 border-green-100'}"
                                  th:text="${alert.statusDescription}"></span>
                        </div>
                    </div>
                </th:block>
                <div th:if="${alerts == null or #lists.isEmpty(alerts)}" class="flex-1 flex items-center justify-center text-gray-300 font-bold italic">
                    NO ALARM LOGS DETECTED
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        // SSE 구독 시작
        const eventSource = new EventSource('/api/notifications/subscribe');

        eventSource.addEventListener('alertUpdate', function(event) {
            showEmergencyToast(event.data);
        });

        // ✅ 알림 테스트 함수
        function testPush() {
            console.log("알림 테스트를 시작합니다.");
            // 실제 동작 확인을 위해 토스트를 직접 띄워봄
            showEmergencyToast("시스템 테스트 알림이 정상적으로 작동 중입니다!");
        }

        // ✅ 토스트 알림 표시 함수
        function showEmergencyToast(message) {
            const container = document.getElementById('toastContainer');
            if(!container) return;

            const toast = document.createElement('div');
            toast.className = "bg-red-600 text-white p-6 rounded-[30px] shadow-2xl border-4 border-red-800 min-w-[380px] animate-bounce mb-4 cursor-pointer hover:scale-105 transition-transform";
            toast.innerHTML = `
                <div class="flex items-center gap-5">
                    <div class="text-5xl">🚨</div>
                    <div>
                        <h4 class="text-[15px] font-[900] uppercase italic tracking-tighter">Emergency Alert</h4>
                        <p class="text-[12px] font-bold mt-2">${message}</p>
                    </div>
                </div>`;

            // 클릭 시 페이지 새로고침하여 최신 로그 확인
            toast.onclick = () => location.reload();

            container.appendChild(toast);

            // 6초 후 제거
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        }
    </script>
</th:block>
</html>
