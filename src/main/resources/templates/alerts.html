<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<div layout:fragment="content">
    <div id="toastContainer" class="fixed top-10 right-10 z-[110] flex flex-col gap-4"></div>

    <div class="mt-10 bg-white rounded-[50px] shadow-sm p-12 flex-1 flex flex-col">
        <h2 class="text-3xl font-[900] text-gray-800 italic uppercase">실시간 알림 테스트</h2>
        <p class="text-sm text-gray-400 font-bold mb-10">버튼을 누르면 우측 상단에 빨간색 삐용이 알림만 뜹니다.</p>

        <div class="rounded-[35px] border border-gray-100 overflow-hidden bg-white">
            <div class="bg-gray-900 text-white flex font-black py-4 px-12 text-center uppercase">
                <div class="w-20">ID</div>
                <div class="flex-1 text-left px-10">장치 정보</div>
                <div class="w-48">알림 전송</div>
            </div>

            <div class="divide-y divide-gray-50">
                <th:block th:each="alert : ${alerts}">
                    <div class="flex py-6 px-12 text-center items-center hover:bg-gray-50">
                        <div class="w-20 font-bold text-gray-400" th:text="${alert.id}">0</div>
                        <div class="flex-1 text-left px-10 text-gray-700 font-bold">
                            장애 로그 - <span th:text="${alert.inverterId}">인버터</span>
                        </div>
                        <div class="w-48">
                            <button th:onclick="|sendPushOnly(${alert.id})|"
                                    class="px-6 py-2 rounded-full bg-red-500 text-white text-xs font-black uppercase shadow-lg hover:bg-red-700 transition-all">
                                알림 쏘기
                            </button>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            console.log("SSE 구독 시작...");
            const eventSource = new EventSource('/api/notifications/subscribe');

            // 서버에서 오는 알림 수신
            eventSource.addEventListener('alertUpdate', (event) => {
                console.log("알림 수신:", event.data);
                showRedToast(event.data);
            });

            eventSource.onerror = (err) => console.error("SSE 연결 실패:", err);
        });

        // 🚨 빨간 배경 + 삐용이 푸시 알림 함수
        function showRedToast(message) {
            const container = document.getElementById('toastContainer');
            if(!container) return;

            const toast = document.createElement('div');
            // 완전 빨간 배경 + 흰색 글씨 + 바운스 애니메이션
            toast.className = "bg-red-600 text-white p-6 rounded-[25px] shadow-2xl border-4 border-red-800 min-w-[350px] animate-bounce mb-4 transition-all duration-500";

            toast.innerHTML = `
                <div class="flex items-center gap-5">
                    <div class="text-4xl animate-pulse">🚨</div>
                    <div class="flex-1">
                        <h4 class="text-white font-black text-sm uppercase italic">Emergency Alert</h4>
                        <p class="text-white text-xs font-bold mt-1">${message}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-red-200 hover:text-white">✕</button>
                </div>
            `;

            container.appendChild(toast);

            // 5초 후 자동 삭제
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        // 상태 변경 없이 알림만 쏘는 함수
        function sendPushOnly(id) {
            // 아까 만든 테스트용 알림 전송 API 호출
            fetch(`/api/alerts/test-notify/${id}`, { method: 'POST' })
                    .then(res => console.log("알림 요청 보냄 ID:", id))
                    .catch(err => console.error("전송 에러:", err));
        }
    </script>
</th:block>
</html>
