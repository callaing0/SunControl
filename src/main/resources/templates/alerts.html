<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<div layout:fragment="content">
    <div class="mt-10 bg-white rounded-[50px] shadow-sm border border-gray-100 p-12 flex-1 flex flex-col min-h-[82vh]">

        <div class="mb-10 px-2 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-[900] text-gray-800 tracking-tighter italic uppercase">알람 이력</h2>
                <p class="text-sm text-gray-400 font-bold mt-1 tracking-tight">실시간 장애 추적 시스템 (Team Project)</p>
            </div>

            <div class="flex gap-3">
                <button th:if="${not #lists.isEmpty(alerts)}"
                        th:onclick="testPush([[${alerts[0].status}]], [[${alerts[0].id}]], [[${alerts[0].location}]])"
                        class="bg-red-500 text-white px-6 py-2 rounded-full font-black text-xs hover:bg-black transition-all shadow-lg">
                    🚨 즉시 알림 테스트
                </button>

                <div th:if="${alerts != null and !#lists.isEmpty(alerts)}" class="text-right">
                    <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-5 py-2.5 rounded-full border border-blue-100 uppercase tracking-widest shadow-sm">
                        Total Logs: <span th:text="${#lists.size(alerts)}">0</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="rounded-[35px] border border-gray-100 overflow-hidden flex flex-col flex-1 bg-white">
            <div class="bg-gray-900 text-white flex text-[13px] font-black py-6 px-12 items-center uppercase tracking-tighter">
                <div class="w-24 text-center">LOG ID</div>
                <div class="w-32 text-center border-l border-gray-700">INVERTER ID</div>
                <div class="flex-1 text-center border-l border-gray-700">장애 감지 시간</div>
                <div class="flex-1 text-center border-l border-gray-700">조치 완료 시간</div>
                <div class="w-40 text-center border-l border-gray-700">위치</div>
                <div class="w-36 text-center border-l border-gray-700">상태</div>
            </div>

            <div class="flex-1 flex flex-col relative divide-y divide-gray-50 overflow-y-auto custom-scroll">
                <th:block th:if="${alerts != null and !#lists.isEmpty(alerts)}">
                    <div th:each="alert : ${alerts}"
                         class="flex py-7 px-12 text-center items-center text-lg font-black text-gray-700 hover:bg-gray-50 transition-colors"
                         th:classappend="${alert.id == 2} ? 'bg-red-50/50' : ''">

                        <div class="w-24 text-base font-bold text-gray-400" th:text="${alert.id}"></div>
                        <div class="w-32 text-base font-bold text-blue-600" th:text="${alert.getInverterNumber()}"></div>
                        <div class="flex-1 text-base text-gray-800" th:text="${alert.createdAt != null ? #temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm:ss') : '--'}"></div>
                        <div class="flex-1 text-base text-gray-400" th:text="${alert.resolvedAt != null ? #temporals.format(alert.resolvedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}"></div>

                        <div class="w-40 text-sm font-[900] uppercase tracking-tighter"
                             th:classappend="${alert.id == 2} ? 'text-red-600' : 'text-gray-600'"
                             th:text="${alert.id == 2 ? '서울 제 1발전소' : alert.location}"></div>

                        <div class="w-36 flex justify-center border-l border-gray-100 pl-4">
                            <form th:if="${alert.status != 2}" th:action="@{/alerts/{id}/status(id=${alert.id})}" method="post">
                                <button type="submit"
                                        class="min-w-[110px] px-4 py-2 rounded-full text-[11px] font-black shadow-sm border transition-all hover:scale-105"
                                        th:classappend="${alert.status == 0 ? 'bg-red-500 text-white border-red-600' : 'bg-amber-400 text-white border-amber-500'}"
                                        th:text="${alert.status == 0 ? '장애 발생' : '확인 중'}"></button>
                            </form>
                            <span th:if="${alert.status == 2}" class="min-w-[110px] px-4 py-2 rounded-full text-[11px] font-black border border-emerald-600 bg-emerald-500 text-white">✅ 조치 완료</span>
                        </div>
                    </div>
                </th:block>

                <div th:if="${alerts == null or #lists.isEmpty(alerts)}" class="flex-1 flex items-center justify-center text-gray-300 font-bold italic text-3xl">
                    NO ALARM LOGS DETECTED
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        // [수정] 알림 파라미터 보강 (상태, ID, 위치 정보 받기)
        window.testPush = function(status, id, location) {
            console.log("테스트 실행 - ID:", id, "상태:", status);

            if (Number(status) === 2) {
                console.warn("이미 조치 완료된 로그입니다.");
                return;
            }

            // ID 2번이면 '서울 제 1발전소' 명칭 강제 적용
            let plantName = (id == 2) ? "서울 제 1발전소" : location;

            if (window.showEmergencyToast && typeof window.showEmergencyToast === 'function') {
                window.showEmergencyToast(`🚨 [${plantName}] 신규 장애 알림이 도착했습니다! (Log ID: ${id})`);
            } else {
                console.error("Layout의 알림 함수를 찾을 수 없습니다.");
            }
        };
        /*]]>*/
    </script>
</th:block>
</html>
