<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>SolarGuard | Statistics</title>

    <th:block layout:fragment="css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            .chart-container {
                position: relative;
                width: 100%;
                height: 100%;
                min-height: 0;
            }
        </style>
    </th:block>
</head>

<body>
<div layout:fragment="content">
    <div class="mt-10 bg-white rounded-[50px] shadow-sm border border-gray-100 p-12 flex-1 flex flex-col min-h-[82vh]">

        <!-- 헤더 -->
        <div class="mb-10 px-2 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-black text-gray-800 tracking-tighter italic uppercase">발전 통계 분석</h2>
                <div class="flex items-center mt-1">
                    <p class="text-sm text-gray-400 font-bold uppercase tracking-widest">
                        기간 누적 발전량, 증감률, 평균 발전량, 기상보정기대값, 인버터 가동 중지 시간을 분석합니다.
                    </p>
                </div>
            </div>
        </div>

        <!-- 필터 영역 -->
        <form method="get" th:action="@{/chart}" id="chartFilterForm" class="mb-10 px-2 flex flex-wrap items-center gap-4">
            <div class="bg-gray-50 p-1.5 rounded-2xl border border-gray-100 flex items-center shadow-sm">
                <a th:href="@{/chart}"
                   class="px-10 py-3.5 bg-yellow-400 text-black rounded-xl font-black shadow-lg shadow-yellow-400/20 italic uppercase tracking-wide">
                    일별
                </a>

                <a th:href="@{/chartMonthly}"
                   class="px-10 py-3.5 text-gray-400 font-black hover:text-gray-600 transition-colors italic uppercase tracking-wide">
                    월별
                </a>
            </div>

            <div class="flex items-center gap-3">
                <button type="button"
                        id="prevDateBtn"
                        class="bg-white px-6 py-3.5 rounded-2xl border border-gray-200 text-gray-700 font-black hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                    이전일
                </button>
                <button type="button"
                        id="todayBtn"
                        class="bg-yellow-400 px-6 py-3.5 rounded-2xl text-black font-black hover:brightness-95 transition-all shadow-sm active:scale-95">
                    오늘
                </button>
                <button type="button"
                        id="nextDateBtn"
                        class="bg-white px-6 py-3.5 rounded-2xl border border-gray-200 text-gray-700 font-black hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                    다음일
                </button>
                <div class="bg-gray-50 rounded-2xl border border-gray-100 shadow-sm px-6 py-3.5 flex items-center">
                    <input type="date"
                           id="selectedDate"
                           name="selectedDate"
                           th:value="${selectedDate}"
                           th:attr="max=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                           class="bg-transparent font-black text-gray-700 outline-none italic uppercase">
                </div>
            </div>
        </form>

        <!-- 요약 카드 -->
        <div class="grid grid-cols-5 gap-5 mb-10">
            <th:block th:if="${statsSummary != null and !#lists.isEmpty(statsSummary)}">
                <div th:each="stat : ${statsSummary}"
                     class="bg-white p-6 rounded-[36px] shadow-sm border border-gray-100 flex flex-col justify-center min-h-[190px]">

                    <div class="flex justify-between items-end mb-5 italic uppercase">
                        <div class="flex items-center min-w-0">
                            <span class="w-1.5 h-5 bg-yellow-400 rounded-full mr-3 shrink-0"></span>

                            <div class="flex items-baseline gap-1.5 min-w-0 flex-wrap">
                                <span class="text-[15px] font-black text-gray-800 leading-tight break-keep"
                                      th:text="${stat.title}">Analysis Item</span>

                                <span class="text-[13px] font-black text-gray-500"
                                      th:if="${#strings.contains(stat.title, '발전량') or #strings.contains(stat.title, '기상보정기대값')}">
                                    (kWh)
                                </span>

                                <span class="text-[13px] font-black text-gray-500"
                                      th:if="${#strings.contains(stat.title, '증감률') or #strings.contains(stat.title, '효율')}">
                                    (%)
                                </span>

                                <span class="text-[13px] font-black text-gray-500"
                                      th:if="${#strings.contains(stat.title, '가동 중지 시간') or #strings.contains(stat.title, '중지 시간')}">
                                    (sec)
                                </span>
                            </div>
                        </div>
                        <span></span>
                    </div>

                    <div class="bg-gray-50 rounded-2xl min-h-[92px] px-5 py-5 flex items-center justify-center text-center">
                        <span class="text-[24px] font-black text-gray-900 leading-none italic break-keep"
                              th:text="${#strings.replace(#strings.replace(#strings.replace(stat.value, 'kWh', ''), '%', ''), 'sec', '')}">
                            0,000
                        </span>
                    </div>
                </div>
            </th:block>

            <th:block th:if="${statsSummary == null or #lists.isEmpty(statsSummary)}">
                <div th:each="i : ${#numbers.sequence(1, 5)}"
                     class="bg-white p-6 rounded-[36px] shadow-sm border border-gray-100 flex flex-col justify-center min-h-[190px]">
                    <div class="flex justify-between items-end mb-5 italic uppercase">
                        <div class="flex items-center">
                            <span class="w-1.5 h-5 bg-yellow-400 rounded-full mr-3"></span>
                            <span class="text-[15px] font-black text-gray-300">WAITING DATA</span>
                        </div>
                        <span></span>
                    </div>

                    <div class="bg-gray-50 rounded-2xl min-h-[92px] px-5 py-5 flex items-center justify-center text-center">
                        <span class="text-[24px] font-black text-gray-300 leading-none italic">--</span>
                    </div>
                </div>
            </th:block>
        </div>

        <!-- 차트 영역 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-1 min-h-[520px]">
            <!-- 발전량 추이 -->
            <div class="bg-white p-10 rounded-[45px] shadow-sm border border-gray-100 flex flex-col transition-all">
                <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center italic uppercase">
                    <span class="w-1.5 h-6 bg-yellow-400 rounded-full mr-3"></span>
                    발전량 추이
                </h3>

                <div class="flex-1 chart-container flex items-center justify-center min-h-0">
                    <canvas id="timeGenChart" th:if="${generationTrend != null and !#lists.isEmpty(generationTrend)}"></canvas>

                    <div th:if="${generationTrend == null or #lists.isEmpty(generationTrend)}" class="text-center">
                        <div class="text-5xl mb-4 opacity-20">📈</div>
                        <p class="text-gray-400 font-bold italic uppercase">분석할 발전량 데이터가 없습니다.</p>
                        <p class="text-[10px] text-gray-300 uppercase tracking-widest mt-2">
                            Waiting for generation statistics...
                        </p>
                    </div>
                </div>
            </div>

            <!-- 기상 조건별 효율 -->
            <div class="bg-white p-10 rounded-[45px] shadow-sm border border-gray-100 flex flex-col transition-all">
                <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center italic uppercase">
                    <span class="w-1.5 h-6 bg-yellow-400 rounded-full mr-3"></span>
                    기상 조건별 발전 효율
                </h3>

                <div class="flex-1 chart-container flex items-center justify-center min-h-0">
                    <canvas id="weatherDistChart" th:if="${weatherEfficiency != null and !#lists.isEmpty(weatherEfficiency)}"></canvas>

                    <div th:if="${weatherEfficiency == null or #lists.isEmpty(weatherEfficiency)}" class="text-center">
                        <div class="text-5xl mb-4 opacity-20">☁️</div>
                        <p class="text-gray-400 font-bold italic uppercase">기상 조건 데이터가 집계되지 않았습니다.</p>
                        <p class="text-[10px] text-gray-300 uppercase tracking-widest mt-2">
                            Waiting for weather efficiency logs...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        const generationTrend = /*[[${generationTrend}]]*/ [];
        const weatherEfficiency = /*[[${weatherEfficiency}]]*/ [];

        const weatherMap = {
            "맑음": "☀️ 맑음",
            "구름": "⛅ 구름",
            "흐림": "☁️ 흐림",
            "비": "🌧️ 비",
            "눈": "❄️ 눈"
        };

        const weatherColorMap = {
            "맑음": "#f59e0b",
            "구름": "#eab308",
            "흐림": "#94a3b8",
            "비": "#2563eb",
            "눈": "#93c5fd"
        };

        const timeGenCtx = document.getElementById('timeGenChart');
        if (timeGenCtx && generationTrend.length > 0) {
            new Chart(timeGenCtx, {
                type: 'line',
                data: {
                    labels: generationTrend.map(item => item.label),
                    datasets: [{
                        label: '발전량 (kWh)',
                        data: generationTrend.map(item => item.value),
                        borderColor: '#facc15',
                        backgroundColor: 'rgba(250, 204, 21, 0.12)',
                        fill: true,
                        tension: 0.35,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                boxWidth: 8,
                                font: {
                                    weight: 'bold',
                                    size: 11
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f8fafc' },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });
        }

        const weatherCtx = document.getElementById('weatherDistChart');
        if (weatherCtx && weatherEfficiency.length > 0) {
            new Chart(weatherCtx, {
                type: 'bar',
                data: {
                    labels: weatherEfficiency.map(item => weatherMap[item.label] || item.label),
                    datasets: [{
                        label: '평균 효율 (%)',
                        data: weatherEfficiency.map(item => item.value),
                        backgroundColor: weatherEfficiency.map(item => weatherColorMap[item.label] || '#3b82f6'),
                        borderRadius: 12,
                        barPercentage: 0.55
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                boxWidth: 8,
                                font: {
                                    weight: 'bold',
                                    size: 11
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f8fafc' },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: {
                                    size: 10,
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });
        }

        const form = document.getElementById('chartFilterForm');
        const dateInput = document.getElementById('selectedDate');
        const prevDateBtn = document.getElementById('prevDateBtn');
        const todayBtn = document.getElementById('todayBtn');
        const nextDateBtn = document.getElementById('nextDateBtn');

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function changeDate(days) {
            if (!dateInput.value) return;

            const currentDate = new Date(dateInput.value + 'T00:00:00');
            currentDate.setDate(currentDate.getDate() + days);

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (currentDate > today) {
                dateInput.value = formatDate(today);
            } else {
                dateInput.value = formatDate(currentDate);
            }

            form.submit();
        }

        if (dateInput) {
            dateInput.addEventListener('change', function () {
                form.submit();
            });
        }

        if (prevDateBtn) {
            prevDateBtn.addEventListener('click', function () {
                changeDate(-1);
            });
        }

        if (todayBtn) {
            todayBtn.addEventListener('click', function () {
                dateInput.value = formatDate(new Date());
                form.submit();
            });
        }

        if (nextDateBtn) {
            nextDateBtn.addEventListener('click', function () {
                changeDate(1);
            });
        }
        /*]]>*/
    </script>
</th:block>
</body>
</html>
