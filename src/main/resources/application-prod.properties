spring.datasource.url=jdbc:mysql://host.docker.internal:3306/sun
spring.datasource.username=sun
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.suncontrol
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL
mybatis.configuration.default-fetch-size=200
mybatis.configuration.default-statement-timeout=30
logging.level.root=INFO
logging.level.com.suncontrol.mapper=INFO
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
