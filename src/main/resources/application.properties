spring.application.name=SunControl
server.port=8080
server.forward-headers-strategy=framework
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.jackson.time-zone=Asia/Seoul
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# DB ??
spring.datasource.url=jdbc:mysql://codevlab.kr:3306/sun?serverTimezone=Asia/Seoul
spring.datasource.username=sun
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis ??
mybatis.type-aliases-package=com.suncontrol.domain.dto
mybatis.configuration.map-underscore-to-camel-case=true

# ?? ?? (SQL? ???)
logging.level.com.suncontrol.mapper=DEBUG